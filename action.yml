name: data-factory-deploy
description: Deploy Azure Data Factory resources

inputs:
  subscriptionId:
    description: 'Azure subscription ID'
    required: true
  resourceGroupName:
    description: 'Data Factory resource group name'
    required: true
  dataFactoryName:
    description: 'Data factory name'
    required: true
  armTemplateFile:
    description: 'ARM template file name'
    required: false
    default: 'ARMTemplateForFactory.json'
  armTemplateParametersFile:
    description: 'ARM template parameters file name'
    required: false
    default: 'ARMTemplateParametersForFactory.json'
  additionalParameters:
    description: 'Additional parameters as a JSON object to override in the ARM template'
    required: false
    default: '{}'
  skipAzModuleInstallation:
    description: 'Parameters which skip the Az module installation'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Install Az PowerShell module
      run: if('${{ inputs.skipAzModuleInstallation }}' -ne 'true') { Install-Module -Name Az -Scope CurrentUser -Repository PSGallery -Force }
      shell: pwsh

    - name: Run Pre-deployment script
      run: |
        ${{ github.action_path }}/PrePostDeploymentScript.ps1 `
          -armTemplate "${{ inputs.armTemplateFile }}" `
          -ResourceGroupName "${{ inputs.resourceGroupName }}" `
          -DataFactoryName "${{ inputs.dataFactoryName }}" `
          -predeployment $true `
          -deleteDeployment $false
      shell: pwsh

    - name: Merge deployment parameters
      id: merge-params
      run: |
        $base = @{ "factoryName" = "${{ inputs.dataFactoryName }}" }
        $additional = '${{ inputs.additionalParameters }}' | ConvertFrom-Json -AsHashtable
        foreach ($key in $additional.Keys) { $base[$key] = $additional[$key] }
        $merged = $base | ConvertTo-Json -Compress
        echo "params=$merged" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Run ARM deploy
      uses: azure/bicep-deploy@v2
      with:
        type: deployment
        operation: create
        scope: resourceGroup
        subscription-id: ${{ inputs.subscriptionId }}
        resource-group-name: ${{ inputs.resourceGroupName }}
        template-file: ${{ inputs.armTemplateFile }}
        parameters-file: ${{ inputs.armTemplateParametersFile }}
        parameters: ${{ steps.merge-params.outputs.params }}
        
    - name: Run Post-deployment script
      run: |
        ${{ github.action_path }}/PrePostDeploymentScript.ps1 `
          -armTemplate "${{ inputs.armTemplateFile }}" `
          -ResourceGroupName "${{ inputs.resourceGroupName }}" `
          -DataFactoryName '${{ inputs.dataFactoryName }}' `
          -predeployment $false `
          -deleteDeployment $true
      shell: pwsh
